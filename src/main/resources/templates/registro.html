<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="layout :: head"
    th:with="titulo='Registro - ReVerdecer Piura'"
  ></head>

  <body>
    <nav th:replace="layout :: navbar"></nav>

    <main>
      <div class="auth-wrapper">
        <div class="auth-card auth-card--wide">
          <h1 class="auth-title">Crear cuenta</h1>

          <div
            th:if="${error}"
            class="auth-alert auth-alert--danger"
            th:text="${error}"
          ></div>

          <form
            th:action="@{/auth/registro}"
            th:object="${usuario}"
            method="post"
            id="registroForm"
            novalidate
            onsubmit="return validarRegistro();"
          >
            <div class="auth-grid">
              <div class="auth-group">
                <label for="nombres"> Nombres</label>
                <input
                  type="text"
                  id="nombres"
                  th:field="*{nombres}"
                  required
                />
              </div>

              <div class="auth-group">
                <label for="apellidoPaterno">Apellido Paterno</label>
                <input
                  type="text"
                  id="apellidoPaterno"
                  th:field="*{apellidoPaterno}"
                  required
                />
              </div>

              <div class="auth-group">
                <label for="apellidoMaterno"> Apellido Materno</label>
                <input
                  type="text"
                  id="apellidoMaterno"
                  th:field="*{apellidoMaterno}"
                  required
                />
              </div>

              <div class="auth-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" th:field="*{correo}" required />
              </div>

              <div class="auth-group">
                <label for="password">Contraseña</label>
                <input
                  type="password"
                  id="password"
                  th:field="*{password}"
                  required
                />
              </div>

              <div class="auth-group">
                <label for="tipoDoc">Tipo de Documento</label>
                <select id="tipoDoc" th:field="*{tipoDoc}" required>
                  <option value="">Seleccionar</option>
                  <option value="DNI">DNI</option>
                  <option value="RUC">RUC</option>
                  <option value="PASAPORTE">Pasaporte</option>
                </select>
              </div>

              <div class="auth-group">
                <label for="dni">Número de Documento</label>
                <input type="text" id="dni" th:field="*{dni}" required />
              </div>

              <div class="auth-group">
                <label for="fechaNacimiento">Fecha de Nacimiento</label>
                <input
                  type="date"
                  id="fechaNacimiento"
                  th:field="*{fechaNacimiento}"
                  required
                />
              </div>

              <div class="auth-group">
                <label for="genero">⚥ Género</label>
                <select id="genero" th:field="*{genero}" required>
                  <option value="">Seleccionar</option>
                  <option value="Masculino">Masculino</option>
                  <option value="Femenino">Femenino</option>
                  <option value="Prefiero no decirlo">
                    Prefiero no decirlo
                  </option>
                </select>
              </div>

              <div class="auth-group">
                <label for="numero">Teléfono</label>
                <input type="tel" id="numero" th:field="*{numero}" required />
              </div>

              <div class="auth-group">
                <label for="direccion1"> Dirección</label>
                <input
                  type="text"
                  id="direccion1"
                  th:field="*{direccion1}"
                  required
                />
              </div>
            </div>

            <button type="submit" class="auth-btn">Registrarse</button>
          </form>

          <footer class="auth-footer">
            <p>
              ¿Ya tienes cuenta?
              <a th:href="@{/auth/login}">Inicia sesión aquí</a>
            </p>
          </footer>
        </div>
      </div>
    </main>

    <footer th:replace="layout :: footer"></footer>

    <th:div th:replace="layout :: scripts"></th:div>
  </body>
</html>
