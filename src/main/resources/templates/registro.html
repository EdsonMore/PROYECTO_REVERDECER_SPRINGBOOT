<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="layout :: head"
    th:with="titulo='Registro - El Buen Beber'"
  ></head>

  <body>
    <div class="container mt-5">
      <!-- regresar -->
      <div class="mb-3">
        <a
          th:href="@{/}"
          class="text-decoration-none text-secondary d-flex align-items-center"
        >
          <i class="bi bi-arrow-left me-2"></i> Regresar
        </a>
      </div>
      <div
        class="row justify-content-center align-items-center"
        style="max-width: 100%; height: 500px"
      >
        <!-- Logo a la izquierda -->
        <div class="col-md-4 text-center text-md-start mb-md-0">
          <img
            th:src="@{/img/logo1.webp}"
            alt="Logo El Buen Beber"
            class="img-fluid"
          />
        </div>

        <!-- Formulario a la derecha -->
        <div class="col-md-7">
          <h2>Registro</h2>

          <!-- Errores -->
          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>

          <!-- FORMULARIO CON BINDING THYMELEAF -->
          <!-- th:action="@{/auth/registro}" genera la URL correcta -->
          <!-- th:object="${usuario}" vincula el formulario al objeto Usuario -->
          <!-- th:field="*{propiedad}" vincula cada input con propiedades del objeto -->
          <form
            th:action="@{/auth/registro}"
            th:object="${usuario}"
            method="post"
            id="registroForm"
            novalidate
            onsubmit="return validarRegistro();"
          >
            <div class="row">
              <div class="col-md-7 mb-3">
                <label for="nombres" class="form-label">Nombres</label>
                <!-- th:field vincula automáticamente con usuario.nombres -->
                <input
                  type="text"
                  id="nombres"
                  class="form-control"
                  th:field="*{nombres}"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label for="apellidoPaterno" class="form-label"
                  >Apellido Paterno</label
                >
                <input
                  type="text"
                  id="apellidoPaterno"
                  class="form-control"
                  th:field="*{apellidoPaterno}"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label for="apellidoMaterno" class="form-label"
                  >Apellido Materno</label
                >
                <input
                  type="text"
                  id="apellidoMaterno"
                  class="form-control"
                  th:field="*{apellidoMaterno}"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label for="correo" class="form-label">Correo</label>
                <input
                  type="email"
                  id="correo"
                  class="form-control"
                  th:field="*{correo}"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  th:field="*{password}"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label for="tipoDoc" class="form-label"
                  >Tipo de Documento</label
                >
                <select
                  id="tipoDoc"
                  class="form-select"
                  th:field="*{tipoDoc}"
                  required
                >
                  <option value="">Seleccionar</option>
                  <option value="DNI">DNI</option>
                  <option value="RUC">RUC</option>
                  <option value="PASAPORTE">PASAPORTE</option>
                  <option value="CARNET_EXTRANJERIA">CARNET EXTRANJERIA</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label for="dni" class="form-label">Número de Documento</label>
                <input
                  type="text"
                  id="dni"
                  class="form-control"
                  th:field="*{dni}"
                  required
                />
              </div>
              <div class="col-md-6 mb-3">
                <label for="fechaNacimiento" class="form-label"
                  >Fecha de Nacimiento</label
                >
                <input
                  type="date"
                  id="fechaNacimiento"
                  class="form-control"
                  th:field="*{fechaNacimiento}"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label for="genero" class="form-label">Género</label>
                <select id="genero" class="form-select" th:field="*{genero}" required>
                  <option value="">Seleccionar</option>
                  <option value="Masculino">Masculino</option>
                  <option value="Femenino">Femenino</option>
                  <option value="Prefiero no decirlo">
                    Prefiero no decirlo
                  </option>
                  <option value="X">Otro</option>
                </select>
              </div>

              <div class="col-md-5 mb-3">
                <label for="numero" class="form-label">Teléfono</label>
                <input
                  type="text"
                  id="numero"
                  class="form-control"
                  th:field="*{numero}"
                  required
                />
              </div>

              <div class="col-md-7 mb-3">
                <label for="direccion1" class="form-label">Dirección</label>
                <input
                  type="text"
                  id="direccion1"
                  class="form-control"
                  th:field="*{direccion1}"
                  required
                />
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Registrarse
            </button>
          </form>
          <center>
            <p class="mt-3">
              ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>
            </p>
          </center>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <div th:replace="~{layout :: scripts}"></div>
    
    <!-- SCRIPT DE VALIDACIÓN NATIVA -->
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
