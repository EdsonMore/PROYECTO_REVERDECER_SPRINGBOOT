<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="layout :: head"></head>

  <body>
    <!-- Navbar -->
    <nav th:replace="layout :: navbar"></nav>

    <!-- Contenido principal -->
    <main class="registro-container">
      <div class="registro-header">
        <h2><i class="bi bi-tree"></i> Registrar Nuevo Árbol</h2>
      </div>

      <!-- Mensaje de error -->
      <div th:if="${error}" class="registro-alert registro-alert-danger">
        <strong>Error:</strong> <span th:text="${error}"></span>
      </div>

      <!-- Formulario -->
      <form
        id="registroForm"
        th:action="@{/arboles/registro}"
        method="POST"
        class="registro-form"
      >
        <div class="registro-form-group">
          <label for="especie">🌿 Especie del Árbol *</label>
          <input type="text" id="especie" name="especie" required />
          <small>Ej: Mango, Tamarindo, Ficus, Roble, etc.</small>
          <div class="registro-invalid-feedback" id="error-especie"></div>
        </div>

        <div class="registro-form-group">
          <label for="ubicacion">📍 Ubicación *</label>
          <textarea
            id="ubicacion"
            name="ubicacion"
            rows="3"
            required
          ></textarea>
          <small
            >Describe dónde está ubicado el árbol (dirección, parque,
            referencia)</small
          >
          <div class="registro-invalid-feedback" id="error-ubicacion"></div>
        </div>

        <div class="registro-form-group">
          <label for="fecha">📅 Fecha de Registro *</label>
          <input type="date" id="fecha" name="fecha" required />
          <div class="registro-invalid-feedback" id="error-fecha"></div>
        </div>

        <div class="registro-form-group">
          <label for="estado">🏥 Estado del Árbol *</label>
          <select id="estado" name="estado" required>
            <option value="">Selecciona un estado...</option>
            <option value="Muy Bueno">🌳 Muy Bueno</option>
            <option value="Bueno">🌿 Bueno</option>
            <option value="Regular">🍂 Regular</option>
            <option value="Malo">🍁 Malo</option>
            <option value="Crítico">⚠️ Crítico</option>
          </select>
          <div class="registro-invalid-feedback" id="error-estado"></div>
        </div>

        <div class="registro-buttons">
          <a th:href="@{/arboles/listado}" class="registro-btn-secondary"
            >Cancelar</a
          >
          <button type="submit" class="registro-btn-success">
            <i class="bi bi-check-circle"></i> Registrar Árbol
          </button>
        </div>
      </form>
    </main>

    <!-- Footer -->
    <footer th:replace="layout :: footer"></footer>
    <!-- Scripts -->
    <th:div th:replace="layout :: scripts"></th:div>
  </body>
</html>
