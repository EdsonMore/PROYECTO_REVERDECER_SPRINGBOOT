<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="layout :: head"></head>

  <body>
    <!-- Navbar -->
    <nav th:replace="layout :: navbar"></nav>

    <!-- Contenido principal -->
    <main class="arboles-container">
      <div class="arboles-header">
        <h2><i class="bi bi-tree"></i> Mis Árboles</h2>
        <a th:href="@{/arboles/registro}" class="arboles-btn-success">
          <i class="bi bi-plus-circle"></i> Registrar Nuevo Árbol
        </a>
      </div>

      <!-- Mensaje de error -->
      <div th:if="${error}" class="arboles-alert arboles-alert-danger">
        <strong>Error:</strong> <span th:text="${error}"></span>
      </div>

      <!-- Tabla de árboles -->
      <div th:if="${arboles != null and arboles.size() > 0}">
        <div class="arboles-table-wrapper">
          <table class="arboles-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Especie</th>
                <th>Ubicación</th>
                <th>Fecha de Registro</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="arbol, iterStat : ${arboles}">
                <td th:text="${iterStat.count}"></td>
                <td th:text="${arbol.especie}"></td>
                <td th:text="${arbol.ubicacion}"></td>
                <td
                  th:text="${#temporals.format(arbol.fecha, 'dd/MM/yyyy')}"
                ></td>
                <td>
                  <span
                    th:if="${arbol.estado == 'Muy Bueno'}"
                    class="arboles-badge arboles-badge-success"
                    th:text="${arbol.estado}"
                  ></span>
                  <span
                    th:if="${arbol.estado == 'Bueno'}"
                    class="arboles-badge arboles-badge-info"
                    th:text="${arbol.estado}"
                  ></span>
                  <span
                    th:if="${arbol.estado == 'Regular'}"
                    class="arboles-badge arboles-badge-warning"
                    th:text="${arbol.estado}"
                  ></span>
                  <span
                    th:if="${arbol.estado == 'Malo'}"
                    class="arboles-badge arboles-badge-danger"
                    th:text="${arbol.estado}"
                  ></span>
                  <span
                    th:if="${arbol.estado == 'Crítico'}"
                    class="arboles-badge arboles-badge-dark"
                    th:text="${arbol.estado}"
                  ></span>
                </td>
                <td>
                  <a
                    th:href="@{/arboles/eliminar/{id}(id=${arbol.id})}"
                    class="arboles-btn-danger btn-eliminar"
                  >
                    <i class="bi bi-trash"></i> Eliminar
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Mensaje cuando no hay árboles -->
      <div
        th:if="${arboles == null or arboles.size() == 0}"
        class="arboles-alert arboles-alert-info"
      >
        <i class="bi bi-info-circle"></i> No tienes árboles registrados aún.
        <a th:href="@{/arboles/registro}">Registra tu primer árbol</a>
      </div>

      <!-- Botón volver -->
      <div style="margin-top: 20px">
        <a th:href="@{/}" class="arboles-btn-outline">
          <i class="bi bi-house"></i> Volver al Inicio
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer th:replace="layout :: footer"></footer>
    <!-- Scripts -->
    <th:div th:replace="layout :: scripts"></th:div>
  </body>
</html>
