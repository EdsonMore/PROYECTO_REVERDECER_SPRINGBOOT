<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="layout :: head"
    th:with="titulo='ReVerdecer Piura - Login'"
  ></head>
  <body>
    <nav th:replace="layout :: navbar"></nav>

    <main>
      <div class="auth-wrapper">
        <div class="auth-card">
          <h1 class="auth-title">Iniciar sesión</h1>

          <div th:if="${param.success}" class="auth-alert auth-alert--success">
            Registro exitoso. ¡Inicia sesión!
          </div>
          <div th:if="${param.logout}" class="auth-alert auth-alert--info">
            Sesión cerrada correctamente.
          </div>
          <div
            th:if="${errorLogin}"
            class="auth-alert auth-alert--danger"
            th:text="${errorLogin}"
          ></div>

          <!-- IMPORTANTE: action DEBE ser /auth/login -->
          <form
            th:action="@{/auth/login}"
            th:object="${usuario}"
            method="post"
            id="loginForm"
            novalidate
            onsubmit="return validarLogin();"
          >
            <div class="auth-group">
              <label for="correo"> Correo electrónico</label>
              <input
                type="email"
                id="correo"
                th:field="*{correo}"
                placeholder="tu@email.com"
                required
              />
            </div>

            <div class="auth-group">
              <label for="password"> Contraseña</label>
              <input
                type="password"
                id="password"
                th:field="*{password}"
                placeholder="Mínimo 6 caracteres"
                required
              />
            </div>

            <button type="submit" class="auth-btn">Iniciar sesión</button>
          </form>

          <footer class="auth-footer">
            <p>
              ¿No tienes cuenta?
              <a th:href="@{/auth/registro}">Regístrate aquí</a>
            </p>
          </footer>
        </div>
      </div>
    </main>

    <footer th:replace="layout :: footer"></footer>
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
