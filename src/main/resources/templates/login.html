<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="layout :: head"
    th:with="titulo='Iniciar Sesión - ReVerdecer Piura'"
  ></head>
  <body>
    <div class="container mt-4">
      <!-- Flecha regresar arriba a la izquierda -->
      <div class="mb-3">
        <a
          th:href="@{/}"
          class="text-decoration-none text-secondary d-flex align-items-center"
        >
          <i class="bi bi-arrow-left me-2"></i> Regresar
        </a>
      </div>

      <div
        class="row justify-content-center align-items-center"
        style="min-height: 70vh"
      >
        <div class="col-md-4 text-center text-md-start mb-4 mb-md-0">
          <img
            th:src="@{/img/logo1.webp}"
            alt="Logo ReVerdecer Piura"
            class="img-fluid"
          />
        </div>

        <!-- Formulario a la derecha -->
        <div class="col-md-4">
          <h2 class="text-success">Iniciar sesión</h2>
          <div th:if="${param.success}" class="alert alert-success">
            ✅ Registro exitoso. Por favor, inicia sesión con tus credenciales.
          </div>
          <div th:if="${param.logout}" class="alert alert-info">
            ℹ️ Sesión cerrada correctamente.
          </div>
          <div
            th:if="${errorLogin}"
            class="alert alert-danger"
            th:text="${errorLogin}"
          ></div>
          <!-- FORMULARIO CON BINDING THYMELEAF -->
          <!-- th:action="@{/auth/login}" genera la URL correcta -->
          <!-- th:object="${usuario}" vincula el formulario al objeto Usuario -->
          <!-- th:field="*{propiedad}" vincula cada input con propiedades del objeto -->
          <form
            th:action="@{/auth/login}"
            th:object="${usuario}"
            method="post"
            novalidate
            onsubmit="return validarLogin();"
          >
            <div class="mb-3">
              <label for="correo" class="form-label">Correo electrónico</label>
              <!-- th:field="*{correo}" vincula automáticamente con usuario.correo -->
              <!-- El nombre del input será "correo" igual que la propiedad Java -->
              <input
                type="email"
                id="correo"
                class="form-control"
                th:field="*{correo}"
                placeholder="tu@email.com"
                required
              />
              <small class="form-text text-danger" id="errorCorreo"></small>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <!-- th:field="*{password}" vincula automáticamente con usuario.password -->
              <input
                type="password"
                id="password"
                class="form-control"
                th:field="*{password}"
                placeholder="Mínimo 8 caracteres"
                required
              />
              <small class="form-text text-danger" id="errorPassword"></small>
            </div>

            <button type="submit" class="btn btn-success w-100">
              <i class="bi bi-tree me-2"></i>Iniciar sesión
            </button>
          </form>

          <p class="mt-3">
            ¿No tienes cuenta?
            <a th:href="@{/auth/registro}" class="text-success">Regístrate</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <div th:replace="~{layout :: scripts}"></div>

    <!-- SCRIPT DE VALIDACIÓN NATIVA -->
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
